name: Release

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:
    inputs:
      version:
        description: Version in vMAJOR.MINOR.PATCH form
        required: true
        type: string

permissions:
  contents: read

env:
  CANDIDATE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
  CARGO_INCREMENTAL: "0"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable
          components: clippy, rustfmt
      - name: Install actionlint 1.7.12
        shell: bash
        run: bash .github/scripts/install-actionlint.sh
      - run: actionlint
      - name: Verify candidate version matches the workspace version
        shell: bash
        run: |
          mapfile -t versions < <(
            cargo metadata --locked --no-deps --format-version 1 \
              | jq -r '
                  .workspace_members as $members
                  | .packages[]
                  | select(.id as $id | $members | index($id))
                  | .version
                ' \
              | sort -u
          )
          test "${#versions[@]}" -eq 1
          test "$CANDIDATE_VERSION" = "v${versions[0]}"
      - run: cargo fmt --all --check
      - run: cargo fmt --manifest-path fuzz/Cargo.toml --all --check
      - run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings
      - run: cargo clippy --locked --manifest-path fuzz/Cargo.toml --all-targets --all-features -- -D warnings
      - run: cargo test --locked --workspace --all-targets --all-features
      - name: Run 10,000-iteration lifecycle stress gates
        run: cargo test --locked --release --workspace stress_10000 -- --ignored --nocapture
      - name: Lint strict relay-only controller rebuild
        env:
          RUSTFLAGS: --cfg yonder_e2e_rebuild
        run: cargo clippy --locked -p yon --tests -- -D warnings
      - name: Prove strict relay-only controller rebuild
        env:
          RUSTFLAGS: --cfg yonder_e2e_rebuild
        run: >-
          cargo test --locked -p yon --test end_to_end
          strict_relay_only_fallback_rebuilds_the_controller_swarm -- --exact
      - name: Reject the test-only rebuild cfg in release builds
        shell: bash
        run: |
          if RUSTFLAGS='--cfg yonder_e2e_rebuild' cargo check --locked --release -p yon; then
            echo 'test-only rebuild cfg entered a release build' >&2
            exit 1
          fi
      - run: cargo test --locked --workspace --doc
      - name: Reject unsafe first-party Rust
        shell: bash
        run: |
          if git grep -n -E '(^|[^[:alnum:]_])unsafe([^[:alnum:]_]|$)' -- '*.rs'; then
            echo 'first-party Rust source contains the unsafe keyword' >&2
            exit 1
          fi
      - name: Verify security-sensitive dependency versions
        shell: bash
        run: |
          for manifest in Cargo.toml fuzz/Cargo.toml; do
            bash .github/scripts/verify-security-exceptions.sh "$manifest"
          done
      - uses: taiki-e/install-action@ed67fa35ac944f3a9b33f12c4dd43b6f31a47e20 # v2
        with:
          tool: cargo-audit@0.22.2,cargo-deny@0.20.2
      - name: Audit production lockfile
        run: >-
          cargo audit --deny warnings
          --ignore RUSTSEC-2026-0118
          --ignore RUSTSEC-2026-0119
          --ignore RUSTSEC-2024-0436
      - run: cargo deny -L error --locked check
      - name: Audit fuzz lockfile
        run: >-
          cargo audit --file fuzz/Cargo.lock --deny warnings
          --ignore RUSTSEC-2026-0118
          --ignore RUSTSEC-2026-0119
          --ignore RUSTSEC-2024-0436
      - run: cargo deny -L error --manifest-path fuzz/Cargo.toml --locked --config fuzz/deny.toml check

  coverage:
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-15
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4fd1da8b0805d2d2e936788875a7d65dbd677dc2 # nightly
        with:
          toolchain: nightly
          components: llvm-tools-preview
          targets: ${{ matrix.target }}
      - uses: taiki-e/install-action@ed67fa35ac944f3a9b33f12c4dd43b6f31a47e20 # v2
        with:
          tool: cargo-llvm-cov@0.8.7
      - name: Install musl linker
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes musl-tools
      - name: Generate first-party coverage report
        shell: bash
        run: |
          cargo +nightly llvm-cov \
            --locked --workspace --all-targets --all-features \
            --target "${{ matrix.target }}" \
            --branch --json --output-path coverage.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-${{ matrix.target }}
          path: coverage.json
          if-no-files-found: error
          overwrite: true
      - name: Enforce risk-based first-party coverage
        shell: bash
        run: |
          jq --exit-status '
            .data as $data
            | ($data | length) > 0
            and all($data[];
              .totals.lines.count > 0
              and (.totals.lines.covered * 100 >= .totals.lines.count * 95)
              and .totals.functions.count > 0
              and (.totals.functions.covered * 100 >= .totals.functions.count * 95)
              and .totals.regions.count > 0
              and (.totals.regions.covered * 100 >= .totals.regions.count * 90)
              and .totals.branches.count > 0
              and (.totals.branches.covered * 100 >= .totals.branches.count * 75)
              and all(.files[];
                .summary.lines.count == 0
                or (.summary.lines.covered * 100 >= .summary.lines.count * 75)
              )
            )
          ' coverage.json >/dev/null

  sbom:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable
      - uses: taiki-e/install-action@ed67fa35ac944f3a9b33f12c4dd43b6f31a47e20 # v2
        with:
          tool: cargo-cyclonedx@0.5.9
      - name: Generate reproducible CycloneDX SBOMs
        shell: bash
        run: |
          SOURCE_DATE_EPOCH="$(git show --no-patch --format=%ct HEAD)"
          export SOURCE_DATE_EPOCH
          cargo metadata --locked --format-version 1 >/dev/null
          lockfile_sha256="$(sha256sum Cargo.lock | cut -d ' ' -f 1)"
          cargo cyclonedx \
            --format json \
            --describe binaries \
            --all-features \
            --target all \
            --spec-version 1.5
          test "$(sha256sum Cargo.lock | cut -d ' ' -f 1)" = "$lockfile_sha256"

          while IFS= read -r -d '' sbom; do
            normalized="$(mktemp)"
            jq --sort-keys '
              ([.metadata.component, .components[]]
                | map(select(."bom-ref" | startswith("path+file://")))
                | map({key: ."bom-ref", value: .purl})
                | from_entries) as $refs
              | .metadata.component."bom-ref" =
                  ($refs[.metadata.component."bom-ref"] // .metadata.component."bom-ref")
              | .components |= map(
                  ."bom-ref" = ($refs[."bom-ref"] // ."bom-ref")
                )
              | .dependencies |= map(
                  .ref = ($refs[.ref] // .ref)
                  | if has("dependsOn") then
                      .dependsOn |= map($refs[.] // .)
                    else
                      .
                    end
                )
            ' "$sbom" > "$normalized"
            mv "$normalized" "$sbom"
          done < <(find crates -type f -name '*.cdx.json' -print0)

          mkdir dist
          mapfile -d '' sboms < <(find crates -type f -name '*.cdx.json' -print0)
          test "${#sboms[@]}" -eq 2
          for sbom in "${sboms[@]}"; do
            name="$(jq --raw-output '.metadata.component.name' "$sbom")"
            case "$name" in
              yon|yon-relay)
                jq --exit-status \
                  '.bomFormat == "CycloneDX" and .specVersion == "1.5"' \
                  "$sbom" >/dev/null
                cp "$sbom" "dist/${name}.cdx.json"
                ;;
              *)
                echo "unexpected SBOM component: $name" >&2
                exit 1
                ;;
            esac
          done
          test -s dist/yon.cdx.json
          test -s dist/yon-relay.cdx.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: yonder-sbom
          path: dist/*.cdx.json
          if-no-files-found: error
          overwrite: true

  licenses:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable
      - name: Install cargo-about 0.9.1
        run: cargo install --locked --version 0.9.1 --features cli cargo-about
      - name: Generate third-party license bundle
        shell: bash
        run: |
          mkdir dist
          cargo about generate --locked --workspace --all-features --fail \
            --output-file dist/THIRD-PARTY-LICENSES.html about.hbs
          cp LICENSE-MIT LICENSE-APACHE dist/
          test -s dist/THIRD-PARTY-LICENSES.html
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: yonder-licenses
          path: dist/*
          if-no-files-found: error
          overwrite: true

  msrv:
    needs: quality
    name: MSRV ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-15
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@39b0b3842c7e8bbf6904c0bfc3d9006fdd4dc4e0 # 1.88.0
        with:
          toolchain: 1.88.0
          targets: ${{ matrix.target }}
      - name: Install musl linker
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes musl-tools
      - run: cargo build --locked --workspace --all-targets --all-features --target ${{ matrix.target }}
      - name: Check fuzz workspace for Linux musl
        if: runner.os == 'Linux'
        env:
          CXX: clang++
        run: cargo check --locked --manifest-path fuzz/Cargo.toml --all-targets --all-features --target ${{ matrix.target }}
      - name: Check fuzz workspace
        if: runner.os != 'Linux'
        run: cargo check --locked --manifest-path fuzz/Cargo.toml --all-targets --all-features --target ${{ matrix.target }}

  miri:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4fd1da8b0805d2d2e936788875a7d65dbd677dc2 # nightly
        with:
          toolchain: nightly
          components: miri
      - run: cargo +nightly miri test --locked -p yonder-core

  sanitizer:
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address, thread]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4fd1da8b0805d2d2e936788875a7d65dbd677dc2 # nightly
        with:
          toolchain: nightly
          components: rust-src
      - name: Run ${{ matrix.sanitizer }} sanitizer
        env:
          RUSTFLAGS: -Zsanitizer=${{ matrix.sanitizer }} --cfg yonder_sanitizer
          RUSTDOCFLAGS: -Zsanitizer=${{ matrix.sanitizer }} --cfg yonder_sanitizer
        run: >-
          cargo +nightly test --locked -Zbuild-std
          --target x86_64-unknown-linux-gnu
          --workspace --all-targets --all-features

  release-fuzz:
    needs: [quality, coverage, sbom, licenses, msrv, miri, sanitizer, build]
    timeout-minutes: 330
    strategy:
      fail-fast: false
      matrix:
        target: [connection_code, wire_protocol, session_state, network_address]
        shard: [1, 2, 3, 4, 5]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4fd1da8b0805d2d2e936788875a7d65dbd677dc2 # nightly
        with:
          toolchain: nightly
      - uses: taiki-e/install-action@ed67fa35ac944f3a9b33f12c4dd43b6f31a47e20 # v2
        with:
          tool: cargo-fuzz@0.13.2
      - name: Fuzz ${{ matrix.target }} shard ${{ matrix.shard }} for five hours
        shell: bash
        env:
          FUZZ_TARGET: ${{ matrix.target }}
          FUZZ_SEED: ${{ matrix.shard }}
        run: |
          if [[ "$FUZZ_TARGET" == "network_address" ]]; then
            cargo +nightly fuzz run "$FUZZ_TARGET" --target x86_64-unknown-linux-gnu --features network-address -- -max_total_time=18000 -timeout=10 -seed="$FUZZ_SEED"
          else
            cargo +nightly fuzz run "$FUZZ_TARGET" --target x86_64-unknown-linux-gnu -- -max_total_time=18000 -timeout=10 -seed="$FUZZ_SEED"
          fi

  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            suffix: linux-x86_64
            extension: ""
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            suffix: linux-aarch64
            extension: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows-x86_64
            extension: .exe
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            suffix: windows-aarch64
            extension: .exe
          - os: macos-15-intel
            target: x86_64-apple-darwin
            suffix: macos-x86_64
            extension: ""
          - os: macos-15
            target: aarch64-apple-darwin
            suffix: macos-aarch64
            extension: ""

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable
          components: clippy
          targets: ${{ matrix.target }}
      - name: Install musl linker
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes musl-tools
      - run: cargo clippy --locked --workspace --all-targets --all-features --target ${{ matrix.target }} -- -D warnings
      - run: cargo test --locked --workspace --all-features --target ${{ matrix.target }}
      - run: cargo build --locked --release --target ${{ matrix.target }}
      - name: Stage Unix binaries
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir stage
          cp "target/${{ matrix.target }}/release/yon" stage/yon
          cp "target/${{ matrix.target }}/release/yon-relay" stage/yon-relay

          smoke_root="$(mktemp -d)"
          mkdir "$smoke_root/yon" "$smoke_root/yon-relay"
          cp stage/yon "$smoke_root/yon/yon"
          cp stage/yon-relay "$smoke_root/yon-relay/yon-relay"
          (
            cd "$smoke_root/yon"
            ./yon --version
            ./yon --help >/dev/null
          )
          (
            cd "$smoke_root/yon-relay"
            ./yon-relay --version
            ./yon-relay --help >/dev/null
            ./yon-relay identity init --output relay.key
            test -s relay.key
          )

          test "$(wc -c < stage/yon)" -le 20971520
          test "$(wc -c < stage/yon-relay)" -le 16777216
      - name: Create protected Windows relay smoke directory
        if: runner.os == 'Windows'
        uses: ./.github/actions/secure-directory
        with:
          path: ${{ runner.temp }}/yonder-smoke-${{ matrix.target }}-${{ github.run_id }}-${{ github.run_attempt }}/yon-relay
      - name: Stage Windows binaries
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory stage
          Copy-Item "target/${{ matrix.target }}/release/yon.exe" "stage/yon.exe"
          Copy-Item "target/${{ matrix.target }}/release/yon-relay.exe" "stage/yon-relay.exe"

          $smokeRoot = Join-Path $env:RUNNER_TEMP "yonder-smoke-${{ matrix.target }}-${{ github.run_id }}-${{ github.run_attempt }}"
          $yonSmoke = Join-Path $smokeRoot "yon"
          $relaySmoke = Join-Path $smokeRoot "yon-relay"
          New-Item -ItemType Directory -Force -Path $yonSmoke | Out-Null
          $yonExecutable = Join-Path $yonSmoke "yon.exe"
          $relayExecutable = Join-Path $relaySmoke "yon-relay.exe"
          Copy-Item "stage/yon.exe" $yonExecutable
          Copy-Item "stage/yon-relay.exe" $relayExecutable

          Push-Location $yonSmoke
          try {
            & $yonExecutable --version
            if ($LASTEXITCODE -ne 0) { throw "yon --version failed with exit code $LASTEXITCODE" }
            & $yonExecutable --help | Out-Null
            if ($LASTEXITCODE -ne 0) { throw "yon --help failed with exit code $LASTEXITCODE" }
          } finally {
            Pop-Location
          }

          Push-Location $relaySmoke
          try {
            & $relayExecutable --version
            if ($LASTEXITCODE -ne 0) { throw "yon-relay --version failed with exit code $LASTEXITCODE" }
            & $relayExecutable --help | Out-Null
            if ($LASTEXITCODE -ne 0) { throw "yon-relay --help failed with exit code $LASTEXITCODE" }
            & $relayExecutable identity init --output relay.key
            if ($LASTEXITCODE -ne 0) { throw "yon-relay identity init failed with exit code $LASTEXITCODE" }
            if ((Get-Item relay.key).Length -eq 0) { throw "empty relay identity" }
          } finally {
            Pop-Location
          }

          if ((Get-Item "stage/yon.exe").Length -gt 20MB) { throw "yon exceeds 20 MiB" }
          if ((Get-Item "stage/yon-relay.exe").Length -gt 16MB) { throw "yon-relay exceeds 16 MiB" }
      - name: Verify static Linux binaries
        if: runner.os == 'Linux'
        shell: bash
        run: |
          for binary in stage/*; do
            file "$binary" | grep -Eq "statically linked|static-pie linked"
            if readelf -l "$binary" | grep -q "INTERP"; then
              exit 1
            fi
            if readelf -d "$binary" | grep -q "NEEDED"; then
              exit 1
            fi
            ldd_output="$(ldd "$binary" 2>&1 || true)"
            if ! grep -Eq "statically linked|not a dynamic executable" <<<"$ldd_output"; then
              printf '%s\n' "$ldd_output" >&2
              exit 1
            fi
          done
      - name: Verify Windows imports
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $targetArchitecture = switch ('${{ matrix.target }}') {
            'x86_64-pc-windows-msvc' { 'x64' }
            'aarch64-pc-windows-msvc' { 'arm64' }
            default { throw "unsupported Windows target: ${{ matrix.target }}" }
          }
          $hostArchitecture = switch ([System.Runtime.InteropServices.RuntimeInformation]::ProcessArchitecture) {
            'X64' { 'x64' }
            'Arm64' { 'arm64' }
            default { throw "unsupported Windows runner architecture: $_" }
          }
          $component = switch ($targetArchitecture) {
            'x64' { 'Microsoft.VisualStudio.Component.VC.Tools.x86.x64' }
            'arm64' { 'Microsoft.VisualStudio.Component.VC.Tools.ARM64' }
          }
          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          if (-not (Test-Path -LiteralPath $vswhere -PathType Leaf)) {
            throw "vswhere not found: $vswhere"
          }
          $installationPath = & $vswhere -latest -products '*' -requires $component -property installationPath
          if ($LASTEXITCODE -ne 0 -or -not $installationPath) {
            throw "Visual Studio component not found: $component"
          }
          $toolsetFile = Join-Path $installationPath 'VC\Auxiliary\Build\Microsoft.VCToolsVersion.default.txt'
          $toolsetVersion = (Get-Content -LiteralPath $toolsetFile -Raw).Trim()
          $dumpbin = Join-Path $installationPath "VC\Tools\MSVC\$toolsetVersion\bin\Host$hostArchitecture\$targetArchitecture\dumpbin.exe"
          if (-not (Test-Path -LiteralPath $dumpbin -PathType Leaf)) {
            throw "dumpbin not found: $dumpbin"
          }

          foreach ($binary in Get-ChildItem stage/*.exe) {
            $output = & $dumpbin /NOLOGO /DEPENDENTS $binary.FullName
            if ($LASTEXITCODE -ne 0) {
              throw "dumpbin failed: $binary"
            }
            $imports = @(
              $output | ForEach-Object {
                if ($_ -match '^\s+([A-Za-z0-9._-]+\.dll)\s*$') {
                  $Matches[1].ToUpperInvariant()
                }
              } | Sort-Object -Unique
            )
            if ($imports.Count -eq 0) {
              throw "no PE imports found: $binary"
            }
            foreach ($import in $imports) {
              if ($import -match '^(API-MS-WIN-CRT-.+|UCRTBASE|VCRUNTIME.*|MSVCP.*|MSVCR.*|CONCRT.*|VCOMP.*|VCAMP.*)\.DLL$') {
                throw "dynamic CRT dependency in ${binary}: $import"
              }
              if ($import -match '^(API-MS-WIN-|EXT-MS-WIN-).+\.DLL$') {
                continue
              }
              $systemLibrary = Join-Path ([Environment]::SystemDirectory) $import
              if (-not (Test-Path -LiteralPath $systemLibrary -PathType Leaf)) {
                throw "non-system DLL dependency in ${binary}: $import"
              }
            }
          }
      - name: Verify macOS system libraries
        if: runner.os == 'macOS'
        shell: bash
        run: |
          for binary in stage/*; do
            unexpected="$(otool -L "$binary" | tail -n +2 | awk '{print $1}' | grep -Ev '^(/usr/lib/|/System/Library/)' || true)"
            test -z "$unexpected"
          done
      - name: Package Unix binaries
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir dist
          tar --create --gzip \
            --file "dist/yon-${{ matrix.suffix }}.tar.gz" \
            --directory stage yon
          tar --create --gzip \
            --file "dist/yon-relay-${{ matrix.suffix }}.tar.gz" \
            --directory stage yon-relay
          test "$(tar --list --gzip --file "dist/yon-${{ matrix.suffix }}.tar.gz" | wc -l)" -eq 1
          test "$(tar --list --gzip --file "dist/yon-relay-${{ matrix.suffix }}.tar.gz" | wc -l)" -eq 1
      - name: Package Windows binaries
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory dist
          Compress-Archive -LiteralPath stage/yon.exe -DestinationPath "dist/yon-${{ matrix.suffix }}.zip"
          Compress-Archive -LiteralPath stage/yon-relay.exe -DestinationPath "dist/yon-relay-${{ matrix.suffix }}.zip"

          Add-Type -AssemblyName System.IO.Compression.FileSystem
          foreach ($archive in Get-ChildItem dist/*.zip) {
            $zip = [System.IO.Compression.ZipFile]::OpenRead($archive.FullName)
            try {
              if ($zip.Entries.Count -ne 1) {
                throw "archive must contain exactly one executable: $archive"
              }
            } finally {
              $zip.Dispose()
            }
          }
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: yonder-${{ matrix.suffix }}
          path: dist/*
          if-no-files-found: error
          overwrite: true

  network-matrix:
    needs: [quality, build]
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: yonder-linux-x86_64
          path: candidate
      - name: Install namespace test tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes iproute2 iptables
      - name: Run risk-based namespace and impairment matrix
        shell: bash
        run: |
          mkdir stage
          tar --extract --gzip --file candidate/yon-linux-x86_64.tar.gz --directory stage
          tar --extract --gzip --file candidate/yon-relay-linux-x86_64.tar.gz --directory stage
          chmod +x stage/yon stage/yon-relay
          sudo bash .github/scripts/run-network-matrix.sh \
            stage/yon stage/yon-relay | tee network-matrix.txt
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: yonder-network-matrix
          path: network-matrix.txt
          if-no-files-found: error
          overwrite: true

  performance-baseline:
    needs: quality
    name: Performance baseline ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable
      - name: Run Criterion benchmarks
        shell: bash
        run: |
          cargo bench --locked --all-features -p yon --bench opaque -- --noplot
          cargo bench --locked --all-features -p yonder-core --bench core -- --noplot
          cargo bench --locked --all-features -p yonder-net --bench path -- --noplot
      - name: Build optimized product binaries for process samples
        run: cargo build --locked --release -p yon -p yon-relay
      - name: Run real Linux process terminal throughput gate
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p performance
          cargo test --locked --release -p yon --test end_to_end \
            process_terminal_throughput_baseline_uses_the_real_product_path \
            -- --ignored --exact --nocapture 2>&1 \
            | tee performance/process-throughput.txt
      - name: Run real Windows process terminal throughput gate
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force performance | Out-Null
          cargo test --locked --release -p yon --test end_to_end process_terminal_throughput_baseline_uses_the_real_product_path -- --ignored --exact --nocapture 2>&1 |
            Tee-Object -FilePath performance/process-throughput.txt
          if ($LASTEXITCODE -ne 0) { throw "process throughput gate failed with exit code $LASTEXITCODE" }
      - name: Create protected Windows resource-sampling directory
        if: runner.os == 'Windows'
        uses: ./.github/actions/secure-directory
        with:
          path: ${{ runner.temp }}/yonder-performance-${{ github.run_id }}-${{ github.run_attempt }}
      - name: Record Linux runner and process startup samples
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p performance
          rustc -Vv > performance/rustc.txt
          uname -a > performance/system.txt
          lscpu > performance/cpu.txt
          free --bytes > performance/memory.txt
          printf 'ImageOS=%s\nImageVersion=%s\nRUNNER_ARCH=%s\n' \
            "${ImageOS:-unknown}" "${ImageVersion:-unknown}" "${RUNNER_ARCH:-unknown}" \
            > performance/runner-image.txt
          if [[ -r /sys/devices/system/cpu/cpu0/cpufreq/scaling_governor ]]; then
            cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_governor \
              > performance/power-mode.txt
          fi
          printf 'binary,iteration,elapsed_ns\n' > performance/startup.csv
          for binary in yon yon-relay; do
            for iteration in $(seq 1 11); do
              started="$(date +%s%N)"
              "target/release/$binary" --version >/dev/null
              elapsed="$(($(date +%s%N) - started))"
              printf '%s,%s,%s\n' "$binary" "$iteration" "$elapsed" \
                >> performance/startup.csv
            done
          done
          sample_root="$(mktemp -d)"
          chmod 700 "$sample_root"
          relay="$(realpath target/release/yon-relay)"
          "$relay" identity init --output "$sample_root/relay.key" >/dev/null
          cat > "$sample_root/yon-relay.toml" <<'EOF'
          identity = "relay.key"
          listen = ["/ip4/127.0.0.1/tcp/0"]
          external = ["/ip4/127.0.0.1/tcp/46001"]
          EOF
          (
            cd "$sample_root"
            exec "$relay" serve
          ) >"$sample_root/stdout" 2>"$sample_root/stderr" &
          relay_pid="$!"
          deadline=$((SECONDS + 30))
          while ! grep -q '^Relay PeerId:' "$sample_root/stdout"; do
            if ! kill -0 "$relay_pid" 2>/dev/null || ((SECONDS >= deadline)); then
              cat "$sample_root/stderr" >&2
              exit 1
            fi
            sleep 1
          done
          sleep 2
          read -r sampled_pid rss_kib cpu_percent thread_count \
            < <(ps -o pid=,rss=,pcpu=,nlwp= -p "$relay_pid")
          fd_count="$(find "/proc/$relay_pid/fd" -mindepth 1 -maxdepth 1 | wc -l)"
          printf 'pid=%s\nrss_kib=%s\ncpu_percent=%s\nthread_count=%s\nfd_count=%s\n' \
            "$sampled_pid" "$rss_kib" "$cpu_percent" "$thread_count" "$fd_count" \
            > performance/relay-idle.txt
          test "$rss_kib" -le 49152
          test "$fd_count" -le 256
          kill -INT "$relay_pid"
          wait "$relay_pid"
          rm -rf "$sample_root"
          cp -R target/criterion performance/criterion
      - name: Record Windows runner and process startup samples
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force performance | Out-Null
          rustc -Vv | Set-Content -Encoding utf8 performance/rustc.txt
          [System.Runtime.InteropServices.RuntimeInformation]::OSDescription |
            Set-Content -Encoding utf8 performance/system.txt
          Get-CimInstance Win32_Processor |
            Select-Object Name, Manufacturer, NumberOfCores, NumberOfLogicalProcessors, MaxClockSpeed |
            ConvertTo-Json | Set-Content -Encoding utf8 performance/cpu.json
          Get-CimInstance Win32_ComputerSystem |
            Select-Object TotalPhysicalMemory |
            ConvertTo-Json | Set-Content -Encoding utf8 performance/memory.json
          [ordered]@{
            ImageOS = $env:ImageOS
            ImageVersion = $env:ImageVersion
            RunnerArch = $env:RUNNER_ARCH
          } | ConvertTo-Json | Set-Content -Encoding utf8 performance/runner-image.json
          powercfg /GETACTIVESCHEME | Set-Content -Encoding utf8 performance/power-mode.txt
          'binary,iteration,elapsed_ns' | Set-Content -Encoding ascii performance/startup.csv
          foreach ($binary in @('yon', 'yon-relay')) {
            foreach ($iteration in 1..11) {
              $watch = [System.Diagnostics.Stopwatch]::StartNew()
              & "target/release/$binary.exe" --version | Out-Null
              if ($LASTEXITCODE -ne 0) { throw "$binary --version failed" }
              $watch.Stop()
              $nanoseconds = [Math]::Round(
                $watch.ElapsedTicks * (1000000000.0 / [System.Diagnostics.Stopwatch]::Frequency)
              )
              "$binary,$iteration,$nanoseconds" |
                Add-Content -Encoding ascii performance/startup.csv
              }
          }
          $relay = (Resolve-Path target/release/yon-relay.exe).Path
          $relayRoot = Join-Path $env:RUNNER_TEMP "yonder-performance-${{ github.run_id }}-${{ github.run_attempt }}"
          & $relay identity init --output (Join-Path $relayRoot 'relay.key') | Out-Null
          if ($LASTEXITCODE -ne 0) { throw 'relay identity initialization failed' }
          @'
          identity = "relay.key"
          listen = ["/ip4/127.0.0.1/tcp/0"]
          external = ["/ip4/127.0.0.1/tcp/46001"]
          '@ | Set-Content -Encoding ascii (Join-Path $relayRoot 'yon-relay.toml')
          $startInfo = [System.Diagnostics.ProcessStartInfo]::new()
          $startInfo.FileName = $relay
          $startInfo.Arguments = 'serve'
          $startInfo.WorkingDirectory = $relayRoot
          $startInfo.UseShellExecute = $false
          $startInfo.CreateNoWindow = $true
          $startInfo.RedirectStandardOutput = $true
          $startInfo.RedirectStandardError = $true
          $relayProcess = [System.Diagnostics.Process]::new()
          $relayProcess.StartInfo = $startInfo
          if (-not $relayProcess.Start()) { throw 'relay process did not start' }
          try {
            $deadline = [DateTime]::UtcNow.AddSeconds(30)
            do {
              $remaining = [Math]::Max(1, [int]($deadline - [DateTime]::UtcNow).TotalMilliseconds)
              $line = $relayProcess.StandardOutput.ReadLineAsync()
              if (-not $line.Wait($remaining)) { throw 'relay readiness timed out' }
              if ($relayProcess.HasExited -and $null -eq $line.Result) {
                $diagnostics = $relayProcess.StandardError.ReadToEnd()
                throw "relay exited during resource sampling: $diagnostics"
              }
              $ready = $line.Result -match '^Relay PeerId:'
            } while (-not $ready -and [DateTime]::UtcNow -lt $deadline)
            if (-not $ready) { throw 'relay readiness timed out' }
            Start-Sleep -Seconds 2
            $relayProcess.Refresh()
            if ($relayProcess.WorkingSet64 -gt 48MB) {
              throw "idle relay exceeded 48 MiB: $($relayProcess.WorkingSet64)"
            }
            if ($relayProcess.HandleCount -gt 256) {
              throw "idle relay exceeded 256 handles: $($relayProcess.HandleCount)"
            }
            [ordered]@{
              working_set_bytes = $relayProcess.WorkingSet64
              private_memory_bytes = $relayProcess.PrivateMemorySize64
              handle_count = $relayProcess.HandleCount
              thread_count = $relayProcess.Threads.Count
              cpu_seconds = $relayProcess.TotalProcessorTime.TotalSeconds
            } | ConvertTo-Json | Set-Content -Encoding utf8 performance/relay-idle.json
          } finally {
            if (-not $relayProcess.HasExited) {
              $relayProcess.Kill()
              $relayProcess.WaitForExit()
            }
            $relayProcess.Dispose()
            $runnerTemp = [IO.Path]::GetFullPath($env:RUNNER_TEMP).TrimEnd('\') + '\'
            $resolvedRelayRoot = [IO.Path]::GetFullPath($relayRoot).TrimEnd('\') + '\'
            if (-not $resolvedRelayRoot.StartsWith($runnerTemp, [StringComparison]::OrdinalIgnoreCase)) {
              throw "refusing to remove resource-sampling path outside RUNNER_TEMP: $resolvedRelayRoot"
            }
            Remove-Item -Recurse -Force $relayRoot
          }
          Copy-Item -Recurse target/criterion performance/criterion
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: yonder-performance-${{ runner.os }}-${{ runner.arch }}
          path: performance
          if-no-files-found: error
          overwrite: true

  release-candidate:
    needs: [quality, coverage, sbom, licenses, msrv, miri, sanitizer, release-fuzz, build, network-matrix, performance-baseline]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          pattern: yonder-*
          merge-multiple: true
      - name: Add lockfile and checksums
        shell: bash
        run: |
          cp Cargo.lock dist/Cargo.lock
          checksum_file="$RUNNER_TEMP/yonder-SHA256SUMS"
          (
            cd dist
            find . -maxdepth 1 -type f ! -name SHA256SUMS -printf '%f\0' \
              | sort --zero-terminated \
              | xargs --null sha256sum
          ) > "$checksum_file"
          mv "$checksum_file" dist/SHA256SUMS
      - uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: dist/*
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-candidate-${{ env.CANDIDATE_VERSION }}
          path: dist/*
          if-no-files-found: error
          overwrite: true
      - name: Publish GitHub Release
        if: github.event_name == 'push'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$CANDIDATE_VERSION" dist/*
          --verify-tag
          --title "Yonder $CANDIDATE_VERSION"
          --generate-notes
